<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detalhes da Carta</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --green: #00C853;
  --green-dim: #009e42;
  --dark: #0a0a0a;
  --border: rgba(255,255,255,0.07);
  --text: #f0f0f0;
  --muted: #888;
}

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  margin: 0;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 64px;

  display: flex;
  align-items: center;
  justify-content: space-between; /* 👈 importante */
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.7rem;
  letter-spacing: 0.08em;
  text-decoration: none;
  color: var(--text);
}

.logo span { color: var(--green); }

/* BACK BUTTON TOP RIGHT */
.back-btn {
  background: var(--green);
  color: #000;
  padding: 0.6rem 1.2rem;
  border-radius: 10px;
  font-weight: 800;
  text-decoration: none;
  font-size: 0.95rem;
  transition: 0.2s;
}

.back-btn:hover {
  background: var(--green-dim);
  transform: scale(1.05);
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 2rem;
}

/* LAYOUT */
.card-detail {
  display: grid;
  grid-template-columns: 1.2fr 1fr; /* 👈 imagens maiores */
  gap: 2.5rem;
  align-items: start;
}

/* IMAGES BIGGER */
.images {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.2rem;
}

.images img {
  width: 100%;
  height: 450px;   /* 👈 AUMENTADO */
  object-fit: cover;
  border-radius: 12px;
  border: 1px solid var(--border);
}

/* INFO */
.info h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  margin-bottom: 1rem;
}

.meta {
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.3rem;
  color: var(--green);
  margin: 1.2rem 0;
}

/* WHATSAPP */
.whatsapp-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--green);
  color: #000;
  padding: 0.8rem 1.4rem;
  border-radius: 10px;
  font-weight: 800;
  text-decoration: none;
  transition: 0.2s;
}

.whatsapp-btn:hover {
  background: var(--green-dim);
  transform: scale(1.05);
}

/* MOBILE */
@media(max-width: 900px){
  .card-detail {
    grid-template-columns: 1fr;
  }

  .images {
    grid-template-columns: 1fr;
  }

  .images img {
    height: auto;
  }
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">Football<span>Cards</span> PT</a>
  <a href="index.html" class="back-btn">Voltar</a>
</header>

<div class="container">

  <div id="card-detail"></div>

</div>

<script src="cards.js"></script>

<script>
const WA = "351919162715";

const params = new URLSearchParams(window.location.search);
const slug = params.get("card");

const card = cards.find(c => c.slug === slug);

if (!card) {
  document.getElementById("card-detail").innerHTML = "<p>Carta não encontrada.</p>";
} else {

  const msg = encodeURIComponent(
    `Olá! Tenho interesse na carta: ${card.name} — ${card.detail} (${card.set}) — ${card.price}€`
  );

  document.getElementById("card-detail").innerHTML = `
    <div class="card-detail">

      <div class="images">
        <img src="${card.img}" alt="Frente">
        <img src="${card.back}" alt="Verso">
      </div>

      <div class="info">
        <h1>${card.name}</h1>

        <div class="meta">${card.detail}</div>
        <div class="meta">${card.club || ''}</div>
        <div class="meta">${card.set}</div>

        <div class="price">${card.price}€</div>

        <a class="whatsapp-btn" href="https://wa.me/${WA}?text=${msg}" target="_blank">
          <svg width="18" height="18" viewBox="0 0 32 32" fill="currentColor">
            <path d="M16 .4C7.2.4.1 7.5.1 16.3c0 2.9.8 5.7 2.3 8.1L0 32l7.9-2.3c2.3 1.3 4.9 2 7.6 2 8.8 0 15.9-7.1 15.9-15.9S24.8.4 16 .4z"/>
          </svg>
          Contactar no WhatsApp
        </a>

      </div>
    </div>
  `;
}
</script>

</body>
</html>
